<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Privacy Policy Tracker{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; width: 100%; }
        header { background: #1a1a2e; color: white; padding: 1rem 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.3rem; }
        header nav a { color: #b8b8d4; text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
        header nav a:hover { color: white; }
        main { flex: 1; padding: 2rem 0; }
        footer { background: #f0f0f5; padding: 1.5rem 0; text-align: center; color: #888; font-size: 0.85rem; }
        footer a { color: #666; text-decoration: none; margin: 0 0.5rem; }
        footer a:hover { color: #333; }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>Privacy Policy Tracker</h1>
            <nav>
                <a href="{% url 'tracker:home' %}">Home</a>
                <a href="{% url 'tracker:dashboard' %}">Dashboard</a>
                <a href="{% url 'tracker:mission' %}">Mission</a>
                <a href="{% url 'tracker:privacy' %}">Privacy</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer>
        <div class="container">
            Privacy Policy Tracker &copy; {% now "Y" %}
        </div>
    </footer>
</body>
</html>
