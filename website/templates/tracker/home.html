{% extends "base.html" %}

{% block title %}Privacy Policy Tracker{% endblock %}

{% block extra_style %}
<style>
    .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        text-align: center;
    }
    .hero h2 {
        font-size: 2.25rem;
        font-weight: 700;
        color: var(--brown-dark);
        letter-spacing: -0.03em;
        margin-bottom: 0.75rem;
    }
    .hero p {
        font-size: 1.1rem;
        color: var(--text-muted);
        margin-bottom: 2.5rem;
        max-width: 460px;
    }
    .url-input-form {
        display: flex;
        width: 100%;
        max-width: 540px;
    }
    .url-input-form input[type="text"] {
        flex: 1;
        padding: 1rem 1.25rem;
        font-size: 1rem;
        border: 2px solid var(--border);
        border-right: none;
        border-radius: var(--radius) 0 0 var(--radius);
        outline: none;
        font-family: inherit;
        background: var(--surface);
        color: var(--text);
        transition: border-color 0.2s;
    }
    .url-input-form input[type="text"]::placeholder {
        color: var(--brown-light);
    }
    .url-input-form input[type="text"]:focus {
        border-color: var(--brown-light);
    }
    .url-input-form button {
        padding: 1rem 2rem;
        font-size: 1rem;
        background: var(--brown-dark);
        color: var(--surface);
        border: none;
        border-radius: 0 var(--radius) var(--radius) 0;
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
        transition: background 0.2s;
    }
    .url-input-form button:hover {
        background: var(--accent-hover);
    }
</style>
{% endblock %}

{% block content %}
<div class="hero">
    <h2>Track Any Privacy Policy</h2>
    <p>Paste a website URL below to get started.</p>
    <form class="url-input-form" method="get" action="#">
        <input type="text" name="url" placeholder="https://example.com" />
        <button type="submit">Submit</button>
    </form>
</div>
{% endblock %}
