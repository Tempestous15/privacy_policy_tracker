<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ClipPri</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="icons/icon32.png" alt="" width="24" height="24" class="logo-mark">
    <h1>ClipPri</h1>
  </header>

  <!-- extUI: "This Site" and "Saved" used to be two cards stacked in one
       endless scroll -- every saved site's full breakdown rendered inline
       below the current site's, so the list only ever got longer. Tabs
       show one view at a time instead; see popup.js for the switching
       logic and popup.css's header comment for the fuller rationale. -->
  <nav class="tabs" role="tablist">
    <button class="tab active" data-tab="current" role="tab" aria-selected="true">This Site</button>
    <button class="tab" data-tab="saved" role="tab" aria-selected="false">Saved <span id="saved-count" class="tab-count hidden">0</span></button>
  </nav>

  <main>
    <section id="tab-current" class="tab-panel active" role="tabpanel">
      <div class="site-row">
        <span class="site-favicon" id="site-favicon" aria-hidden="true"></span>
        <p id="current-tab-host" class="site-host"></p>
      </div>
      <button id="check-btn">Check this site</button>
      <div id="lookup-result"></div>
    </section>

    <section id="tab-saved" class="tab-panel" role="tabpanel">
      <div id="saved-list"></div>
    </section>
  </main>

  <p id="global-error" class="error hidden"></p>

  <script src="redflags-engine.js"></script>
  <script src="webllm-client.js"></script>
  <script src="storage.js"></script>
  <script src="discovery.js"></script>
  <script src="tosdr.js"></script>
  <script src="tracker_radar_client.js"></script>
  <script src="tracker_category_glossary.js"></script>
  <script src="risk_model.js"></script>
  <script src="glossary.js"></script>
  <script src="glossary_tooltip.js"></script>
  <script src="popup.js"></script>
</body>
</html>
