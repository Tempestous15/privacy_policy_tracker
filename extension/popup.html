<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ClipPri</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>ClipPri</h1>
  </header>

  <main>
    <section id="main-screen" class="screen">
      <div class="card">
        <h2>This site</h2>
        <p id="current-tab-host" class="muted"></p>
        <button id="check-btn">Check this site</button>
        <div id="lookup-result"></div>
      </div>

      <div class="card">
        <h2>Your saved sites</h2>
        <div id="saved-list"></div>
      </div>
    </section>

    <p id="global-error" class="error hidden"></p>
  </main>

  <script src="redflags-engine.js"></script>
  <script src="webllm-client.js"></script>
  <script src="storage.js"></script>
  <script src="discovery.js"></script>
  <script src="tosdr.js"></script>
  <script src="tracker_radar_client.js"></script>
  <script src="tracker_category_glossary.js"></script>
  <script src="risk_model.js"></script>
  <script src="popup.js"></script>
</body>
</html>
