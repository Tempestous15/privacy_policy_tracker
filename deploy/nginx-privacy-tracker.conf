# nginx site config. Install with:
#   sudo cp deploy/nginx-privacy-tracker.conf /etc/nginx/sites-available/privacy-tracker
#   sudo ln -s /etc/nginx/sites-available/privacy-tracker /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace server_name with your domain or EC2 public DNS. For HTTPS, run
# certbot --nginx afterwards (see DEPLOY.md).
server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
